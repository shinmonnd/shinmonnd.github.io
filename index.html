<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinmon Nanda</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }

    /* ── SCENE ───────────────────────────────── */
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        url('images/background.jpg') left 60px / 100% auto no-repeat,
        linear-gradient(to bottom,
          rgb(245,245,245) 7%,
          rgb(78,138,73)   73%,
          rgb(78,138,73)   80%,
          rgb(48,88,44)    100%
        );
    }

    /* ── INVISIBLE CLICK ZONES ───────────────── */
    .item {
      position: absolute;
      cursor: pointer;
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
    }

    #item-tea {
      width: 165px; height: 120px;
      top: 46%; left: 10%;
    }
    #item-cap {
      width: 160px; height: 140px;
      top: 35%; left: 55%;
    }
    #item-nb {
      width: 150px; height: 130px;
      top: 60%; left: 34%;
    }

    /* ── POPUP ───────────────────────────────── */
    .popup {
      display: none;
      position: fixed;
      z-index: 100;
      pointer-events: none;
      width: 190px;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .popup.show {
      display: flex;
      animation: pop-in 0.18s ease-out forwards;
    }
    /* Pin dot connector */
    .popup-pin {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #b89c6e;
      box-shadow: 0 1px 4px rgba(0,0,0,0.22);
      flex-shrink: 0;
      margin-bottom: 6px;
    }
    /* Sticky note card */
    .popup-card {
      background: #fefae8;
      border-radius: 3px;
      padding: 12px 14px 14px;
      width: 100%;
      box-shadow:
        0 2px 6px rgba(0,0,0,0.14),
        2px 3px 0 rgba(180,155,80,0.18);
      transform: rotate(-1.2deg);
      text-align: left;
    }
    .popup-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-style: italic;
      color: #2a1f0a;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(160,130,60,0.2);
      padding-bottom: 5px;
    }
    .popup-card p {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      color: #4a3828;
      line-height: 1.7;
    }
    /* ── SPARKLE INDICATORS ─────────────────── */
    .sparkle {
      position: absolute;
      width: 28px;
      height: 28px;
      margin-left: -14px;
      margin-top: -14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #f5c842;
      text-shadow: 0 0 10px rgba(245, 180, 30, 0.9), 0 0 20px rgba(255, 220, 80, 0.5);
      pointer-events: none;
      z-index: 6;
      user-select: none;
      transition: opacity 0.3s ease;
    }
    .sparkle.hidden { opacity: 0; }
    #spark-tea { top: 53%; left: 32%; animation: sparkle-anim 3s ease-in-out infinite 0s; }
    #spark-cap { top: 44%; left: 75%; animation: sparkle-anim 3s ease-in-out infinite 1s; }
    #spark-nb  { top: 68%; left: 53%; animation: sparkle-anim 3s ease-in-out infinite 2s; }
    @keyframes sparkle-anim {
      0%   { opacity: 0.3; transform: scale(0.7) rotate(0deg); }
      20%  { opacity: 1;   transform: scale(1.3) rotate(20deg); }
      40%  { opacity: 0.5; transform: scale(0.85) rotate(8deg); }
      60%  { opacity: 0.9; transform: scale(1.15) rotate(-12deg); }
      80%  { opacity: 0.3; transform: scale(0.75) rotate(4deg); }
      100% { opacity: 0.3; transform: scale(0.7) rotate(0deg); }
    }

    .name-block {
      position: absolute;
      top: 5%;
      right: 3%;
      text-align: right;
      pointer-events: none;
      z-index: 4;
    }
    .english-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: #1a2a1a;
      letter-spacing: 0.02em;
      line-height: 1.1;
      display: block;
    }
    .burmese-name {
      font-family: 'Padauk', serif;
      font-size: 20px;
      color: #1a2a1a;
      display: block;
      margin-top: 4px;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>

<div class="scene">

  <!-- Popups: pinned sticky note annotations -->
  <div class="popup" id="popup-tea">
    <div class="popup-pin"></div>
    <div class="popup-card">
      <h3>🌿 Roots</h3>
      <p>Yangon-born, New York-based &amp; powered by laphet</p>
    </div>
  </div>
  <div class="popup" id="popup-cap">
    <div class="popup-pin"></div>
    <div class="popup-card">
      <h3>🎓 Learning</h3>
      <p>Columbia University, Class of 2021</p>
    </div>
  </div>
  <div class="popup" id="popup-nb">
    <div class="popup-pin"></div>
    <div class="popup-card">
      <h3>🌎 Work</h3>
      <p>NGO &amp; public policy — from USABC to HIAS, working at the intersection of community, advocacy, and social impact.</p>
    </div>
  </div>

  <!-- Name overlay -->
  <div class="name-block">
    <span class="english-name">Shinmon Nanda</span>
    <span class="burmese-name">သျှင်မွန်နန္ဒ</span>
  </div>

  <!-- Sparkle tap indicators -->
  <div class="sparkle" id="spark-tea">✦</div>
  <div class="sparkle" id="spark-cap">✦</div>
  <div class="sparkle" id="spark-nb">✦</div>

  <!-- Invisible click zones — tea is last so it wins in any DOM overlap -->
  <div class="item" id="item-nb"  data-popup="popup-nb"></div>
  <div class="item" id="item-cap" data-popup="popup-cap"></div>
  <div class="item" id="item-tea" data-popup="popup-tea"></div>

</div>

<script>
  document.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      const popup = document.getElementById(item.dataset.popup);
      const isOpen = popup.classList.contains('show');
      document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
      if (!isOpen) {
        const rect = item.getBoundingClientRect();
        const popupW = 200;
        let left = rect.left + rect.width / 2;
        left = Math.max(popupW / 2 + 8, Math.min(left, window.innerWidth - popupW / 2 - 8));
        popup.style.left = left + 'px';
        popup.style.transform = 'translateX(-50%)';

        // Measure popup height before showing
        popup.style.visibility = 'hidden';
        popup.style.display = 'flex';
        const popupH = popup.offsetHeight;
        popup.style.display = '';
        popup.style.visibility = '';

        // Always pop below the item, clamped to viewport
        const gap = 12;
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        let top = rect.bottom + gap;
        top = Math.max(10, Math.min(top, vh - popupH - 10));
        popup.style.top = top + 'px';
        popup.classList.add('show');
        document.querySelectorAll('.sparkle').forEach(s => s.classList.add('hidden'));
      } else {
        document.querySelectorAll('.sparkle').forEach(s => s.classList.remove('hidden'));
      }
    });
  });

  document.addEventListener('click', () => {
    document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
    document.querySelectorAll('.sparkle').forEach(s => s.classList.remove('hidden'));
  });
</script>
</body>
</html>
