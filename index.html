<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinmon Nanda</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }

    /* ── SCENE ───────────────────────────────── */
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        url('images/background.jpg') left 60px / 100% auto no-repeat,
        linear-gradient(to bottom,
          rgb(244,244,244) 7%,
          rgb(77,137,72)  77%,
          rgb(48,88,44)   100%
        );
    }

    /* ── INVISIBLE CLICK ZONES ───────────────── */
    .item {
      position: absolute;
      cursor: pointer;
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
    }

    #item-tea {
      width: 120px; height: 140px;
      top: 31%; left: 8%;
    }
    #item-cap {
      width: 100px; height: 120px;
      top: 22%; left: 58%;
    }
    #item-nb {
      width: 160px; height: 130px;
      top: 49%; left: 20%;
    }

    /* ── POPUP ───────────────────────────────── */
    .popup {
      display: none;
      position: fixed;
      z-index: 100;
      pointer-events: none;
      width: 200px;
      /* container is transparent — image floats, card sits below */
      background: none;
      border: none;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .popup.show {
      display: flex;
      animation: pop-in 0.18s ease-out forwards;
    }
    /* The floating item image */
    .popup-img {
      width: 130px;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.32));
    }
    /* Text card below the image */
    .popup-card {
      background: rgba(255, 253, 248, 0.97);
      border: 1.5px solid rgba(180, 160, 120, 0.3);
      border-radius: 12px;
      padding: 10px 14px 12px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      text-align: center;
    }
    .popup-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-style: italic;
      color: #1a2a1a;
      margin-bottom: 5px;
    }
    .popup-card p {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      color: #4a3828;
      line-height: 1.65;
      text-align: left;
    }
    .burmese-name {
      position: absolute;
      top: 16%;
      right: 3%;
      font-family: 'Padauk', serif;
      font-size: 15px;
      color: #2a1a0a;
      text-align: right;
      pointer-events: none;
      z-index: 4;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.92); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>

<div class="scene">

  <!-- Popups: floating image + info card below -->
  <div class="popup" id="popup-tea">
    <img src="images/laphet.png" class="popup-img" alt="laphet thoke">
    <div class="popup-card">
      <h3>🌿 Roots</h3>
      <p>Yangon-born, New York-based &amp; powered by laphet</p>
    </div>
  </div>
  <div class="popup" id="popup-cap">
    <img src="images/cap.png" class="popup-img" alt="Columbia cap">
    <div class="popup-card">
      <h3>🎓 Learning</h3>
      <p>Columbia University, Class of 2021</p>
    </div>
  </div>
  <div class="popup" id="popup-nb">
    <img src="images/notebook.png" class="popup-img" alt="notebook">
    <div class="popup-card">
      <h3>🌎 Work</h3>
      <p>NGO &amp; public policy — from USABC to HIAS, working at the intersection of community, advocacy, and social impact.</p>
    </div>
  </div>

  <!-- Burmese name overlay -->
  <div class="burmese-name">သျှင်မွန်နန္ဒ</div>

  <!-- Invisible click zones over background image items -->
  <div class="item" id="item-tea" data-popup="popup-tea"></div>
  <div class="item" id="item-cap" data-popup="popup-cap"></div>
  <div class="item" id="item-nb"  data-popup="popup-nb"></div>

</div>

<script>
  document.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      const popup = document.getElementById(item.dataset.popup);
      const isOpen = popup.classList.contains('show');
      document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
      if (!isOpen) {
        const rect = item.getBoundingClientRect();
        const popupW = 200;
        let left = rect.left + rect.width / 2;
        left = Math.max(popupW / 2 + 8, Math.min(left, window.innerWidth - popupW / 2 - 8));
        popup.style.left = left + 'px';
        popup.style.transform = 'translateX(-50%)';

        // Measure popup height before showing
        popup.style.visibility = 'hidden';
        popup.style.display = 'flex';
        const popupH = popup.offsetHeight;
        popup.style.display = '';
        popup.style.visibility = '';

        // Position above if room, otherwise below; clamp to viewport
        const gap = 12;
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        let top = rect.top - gap >= popupH + 10
          ? rect.top - gap - popupH
          : rect.bottom + gap;
        top = Math.max(10, Math.min(top, vh - popupH - 10));
        popup.style.top = top + 'px';
        popup.classList.add('show');
      }
    });
  });

  document.addEventListener('click', () => {
    document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
  });
</script>
</body>
</html>
