<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: url('images/background.jpg') left 60px / 100% auto no-repeat,
        linear-gradient(to bottom, rgb(245,245,245) 7%, rgb(78,138,73) 73%, rgb(78,138,73) 80%, rgb(48,88,44) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 40px 20px;
      gap: 28px;
    }
    .option {
      text-align: right;
      background: rgba(255,253,248,0.82);
      border-radius: 10px;
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }
    .label {
      font-family: sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
    }
    .name { font-family: 'Great Vibes', cursive; font-size: 36px; }
    .burmese { font-family: 'Padauk', serif; font-size: 18px; margin-top: 2px; }

    .forest    { color: #1a2a1a; }
    .moss      { color: #3a5c30; }
    .sage      { color: #5a7a4a; }
    .maroon    { color: #6b1a1a; }
    .burgundy  { color: #7d2535; }
    .wine      { color: #4a1525; }
  </style>
</head>
<body>

  <div class="option">
    <div class="label">Green A — Forest (current)</div>
    <div class="name forest">Shinmon Nanda</div>
    <div class="burmese forest">သျှင်မွန်နန္ဒ</div>
  </div>

  <div class="option">
    <div class="label">Green B — Moss</div>
    <div class="name moss">Shinmon Nanda</div>
    <div class="burmese moss">သျှင်မွန်နန္ဒ</div>
  </div>

  <div class="option">
    <div class="label">Green C — Sage</div>
    <div class="name sage">Shinmon Nanda</div>
    <div class="burmese sage">သျှင်မွန်နန္ဒ</div>
  </div>

  <div class="option">
    <div class="label">Maroon A — Deep Maroon</div>
    <div class="name maroon">Shinmon Nanda</div>
    <div class="burmese maroon">သျှင်မွန်နန္ဒ</div>
  </div>

  <div class="option">
    <div class="label">Maroon B — Burgundy</div>
    <div class="name burgundy">Shinmon Nanda</div>
    <div class="burmese burgundy">သျှင်မွန်နန္ဒ</div>
  </div>

  <div class="option">
    <div class="label">Maroon C — Wine</div>
    <div class="name wine">Shinmon Nanda</div>
    <div class="burmese wine">သျှင်မွန်နန္ဒ</div>
  </div>

</body>
</html>
